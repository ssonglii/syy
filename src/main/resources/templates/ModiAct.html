<form id="form1" enctype="multipart/form-data">
<div id="div333">

        </tr>
        <tr>
            <td>发布人id：</td><td><input type="text" name="uid" id="uid"readonly="readonly" /></td>

        </tr>

            <td>描述：</td><td><textarea  rows="6" name="adscpt" id="adscpt" /></textarea ></td>
        </tr>
        <tr>
            <td>地点：</td><td><input type="text" name="location" id="location"  /></td>
        </tr>

            <td>类别： </td>

                <input type="radio" id="qita" name="type" value="其他"/>其他
            </td>
        </tr>
        <tr>
            <td>开始时间： </td><td><input type="text" id="start_time" name="start_time"/></td>
        </tr>
        <tr>
            <td>结束时间： </td><td><input type="text" id="end_time" name="end_time"/></td>
        </tr>
        <tr>
            <td>最大人数：</td><td><input type="number" id="max_people" name="max_people"/>人</td>
        </tr>
        <tr>
            <td>报名开始： </td><td><input type="text" id="sign_up_start" name="sign_up_start"/></td>
        </tr>
        <tr>
            <td>报名结束： </td><td><input type="text" id="sign_up_end" name="sign_up_end"/></td>
        </tr>
        <tr>
        <tr>
            <td>发布时间： </td><td><input type="text" id="create_time" name="create_time" /></td>
        </tr>
        <tr>
            <td>图片：</td><td> <img  id="aimg" class="tzphoto" src=""  ><!--width="50px"-->
            <span id="sp1"><input type="button" value="修改或清除图片" onclick="altFile();"></span></td>
        </tr>
        <tr>
            <td class="bt"><input type="button" value="修改" onclick="ModifyAct('form1','/modifyAct')"/>
